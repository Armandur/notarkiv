- name: Trefaldighetstiden
  kind: occasion
  parent: Kyrkoåret
  sort_order: 7
  description: De olika söndagarnas tema i kyrkoåret lyfter fram händelser i Jesu
    liv. Händelserna kretsar kring julen och påsken, som var och en har en förberedelsetid
    och en efterfirningstid. Söndagarna efter trettondedag jul avslutar julen och
    Kristi himmelsfärd och pingsten är påsktidens slutpunkt. Utöver detta finns övriga
    helgdagar som bland annat lyfter fram helgon, martyrer och apostlar.
