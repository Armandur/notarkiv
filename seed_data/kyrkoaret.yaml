  kind: occasion
  parent: Kyrkoåret
  sort_order: 5
  description: När Jesus visat sig för lärjungarna efter uppståndelsen tillbringade
    han fyrtio dagar med att undervisa dem. Sedan lämnade Jesus jorden. Lärjungarna
