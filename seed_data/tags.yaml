# Default-taggar för Notarkiv.
# Alla tillfälle-relaterade taggar har kind: occasion.
# Hierarki via 'parent:' grupperar t.ex. kyrkliga handlingar.
#
# Kyrkoåret (rot > kyrkoårstid > helgdag) ligger i kyrkoaret.yaml, som
# genereras från svk-API:t via scripts/fetch_kyrkoaret.py. _seed_tags läser
# båda filerna.

# Tillfällen - kyrkliga handlingar
- name: Kyrklig handling
  kind: occasion
  description: Samlingsnamn för dop, konfirmation, vigsel, begravning och minnesgudstjänst
  sort_order: 300
- { name: Begravning, kind: occasion, sort_order: 310, parent: Kyrklig handling }
- { name: Dop, kind: occasion, sort_order: 330, parent: Kyrklig handling }
- { name: Konfirmation, kind: occasion, sort_order: 340, parent: Kyrklig handling }
- name: Vigsel
  kind: occasion
  sort_order: 350
  parent: Kyrklig handling
  aliases: [Bröllop]
# Tillfällen - övriga gudstjänster och evenemang
- name: Övriga tillfällen
  kind: occasion
  description: Gudstjänster och evenemang utanför kyrkoåret och kyrkliga handlingar
  sort_order: 500
- { name: Allmän gudstjänst, kind: occasion, sort_order: 510, parent: Övriga tillfällen }
- { name: Skördegudstjänst, kind: occasion, sort_order: 520, parent: Övriga tillfällen }
- { name: Gudstjänst med barn, kind: occasion, sort_order: 530, parent: Övriga tillfällen }
- { name: Skolavslutning, kind: occasion, sort_order: 540, parent: Övriga tillfällen }
- { name: Skoljul, kind: occasion, sort_order: 550, parent: Övriga tillfällen }
- { name: Musikgudstjänst, kind: occasion, sort_order: 560, parent: Övriga tillfällen }
- { name: Konsert, kind: occasion, sort_order: 570, parent: Övriga tillfällen }
- { name: Minnesgudstjänst, kind: occasion, sort_order: 580, parent: Övriga tillfällen }

