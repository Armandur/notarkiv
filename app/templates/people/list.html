{% extends "base.html" %}
{% block title %}Personer - Notarkiv{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Personer</h1>

{% include "people/_list_content.html" %}

<script>
document.addEventListener('click', (e) => {
  const a = e.target.closest('.filter-chip-remove');
  if (!a) return;
  e.preventDefault();
  const params = new URLSearchParams(window.location.search);
  const remaining = params.getAll(a.dataset.name).filter(v => v !== a.dataset.value);
  params.delete(a.dataset.name);
  remaining.forEach(v => params.append(a.dataset.name, v));
  const url = '/people?' + params.toString();
  if (window.htmx) {
    htmx.ajax('GET', url, { target: '#people-content', swap: 'outerHTML' });
  } else {
    window.location.search = params.toString();
  }
});
</script>
{% endblock %}
