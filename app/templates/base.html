<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Notarkiv{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
  <script src="/static/js/htmx.min.js" defer></script>
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-md navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Notarkiv</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      {% if user %}
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/">Översikt</a></li>
        {% if user.can_edit %}
        <li class="nav-item"><a class="nav-link" href="/storage">Lagringsplatser</a></li>
        {% endif %}
      </ul>
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item me-3">
          <span class="navbar-text">
            {{ user.username }} <span class="badge bg-secondary">{{ user.role.value }}</span>
          </span>
        </li>
        <li class="nav-item">
          <form method="post" action="/logout" class="d-inline">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button class="btn btn-sm btn-outline-light" type="submit">Logga ut</button>
          </form>
        </li>
      </ul>
      {% endif %}
    </div>
  </div>
</nav>

<main class="container flex-grow-1">
  {% if flash %}
  <div class="alert alert-{{ flash.kind }} alert-dismissible fade show" role="alert">
    {{ flash.message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endif %}

  {% block content %}{% endblock %}
</main>

<footer class="container mt-5 mb-3 text-muted small">
  <hr>
  Notarkiv v0.1
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
