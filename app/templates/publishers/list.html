{% extends "base.html" %}
{% block title %}Förlag - Notarkiv{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
  <h1 class="h3 mb-0">Förlag</h1>
  {% if user.can_edit %}
  <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#newPubModal">
    Nytt förlag
  </button>
  {% endif %}
</div>

{% include "publishers/_list_content.html" %}

{% if user.can_edit %}
<div class="modal fade" id="newPubModal" tabindex="-1">
  <div class="modal-dialog modal-fullscreen-sm-down">
    <form class="modal-content" method="post" action="/publishers">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="modal-header">
        <h2 class="modal-title h5">Nytt förlag</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Namn</label>
          <input type="text" name="name" class="form-control" required
                 placeholder="t.ex. Verbum">
        </div>
        <div class="mb-3">
          <label class="form-label">Sorteringsnamn (valfritt)</label>
          <input type="text" name="sort_name" class="form-control"
                 placeholder="Default = samma som namn">
        </div>
        <div class="row g-2">
          <div class="col-md-4">
            <label class="form-label">Land (valfritt)</label>
            <input type="text" name="country" class="form-control" placeholder="SE">
          </div>
          <div class="col-md-8">
            <label class="form-label">Hemsida (valfri)</label>
            <input type="url" name="website_url" class="form-control"
                   placeholder="https://...">
          </div>
        </div>
        <div class="mb-3 mt-3">
          <label class="form-label">Beskrivning (valfri)</label>
          <textarea name="description" class="form-control" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-link" data-bs-dismiss="modal">Avbryt</button>
        <button type="submit" class="btn btn-primary">Skapa</button>
      </div>
    </form>
  </div>
</div>
{% endif %}
{% endblock %}
