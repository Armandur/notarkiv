{% extends "base.html" %}
{% block title %}Byt lösenord - Notarkiv{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h4 mb-3">Byt lösenord</h1>
        {% if user.must_change_password %}
        <p class="text-muted small">Du måste byta lösenord innan du kan fortsätta.</p>
        {% endif %}

        <form method="post" action="/change-password">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

          <div class="mb-3">
            <label class="form-label">Nuvarande lösenord</label>
            <input type="password" name="current" class="form-control" required autocomplete="current-password">
          </div>

          <div class="mb-3">
            <label class="form-label">Nytt lösenord</label>
            <input type="password" name="new" class="form-control" required minlength="8" autocomplete="new-password">
            <div class="form-text">Minst 8 tecken</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Bekräfta nytt lösenord</label>
            <input type="password" name="confirm" class="form-control" required minlength="8" autocomplete="new-password">
          </div>

          <button type="submit" class="btn btn-primary w-100">Byt lösenord</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
