{% extends "base.html" %}
{% block title %}Logga in - Notarkiv{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h4 mb-3">Logga in</h1>
        <form method="post" action="/login">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

          <div class="mb-3">
            <label for="username" class="form-label">Användarnamn</label>
            <input type="text" id="username" name="username" class="form-control" required autofocus autocomplete="username">
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Lösenord</label>
            <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password">
          </div>

          <button type="submit" class="btn btn-primary w-100">Logga in</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
