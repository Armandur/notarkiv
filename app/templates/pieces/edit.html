{% extends "base.html" %}
{% block title %}Redigera {{ piece.title }} - Notarkiv{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-baseline mb-3">
  <h1 class="h3 mb-0">Redigera not</h1>
  <a href="/pieces/{{ piece.id }}" class="small">← Tillbaka</a>
</div>

<form method="post" action="/pieces/{{ piece.id }}/edit">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Titel *</label>
      <input type="text" name="title" class="form-control" required value="{{ piece.title }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">Originaltitel</label>
      <input type="text" name="original_title" class="form-control" value="{{ piece.original_title or '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">Kompositör</label>
      <input type="text" name="composer" class="form-control" value="{{ composers_str }}">
      <div class="form-text">Flera separeras med <code>;</code> eller <code>&amp;</code></div>
    </div>
    <div class="col-md-6">
      <label class="form-label">Arrangör</label>
      <input type="text" name="arranger" class="form-control" value="{{ arrangers_str }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">Textförfattare</label>
      <input type="text" name="lyricist" class="form-control" value="{{ lyricists_str }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Språk</label>
      <input type="text" name="language" class="form-control" value="{{ piece.language or '' }}" placeholder="sv, en, la ...">
    </div>
    <div class="col-md-3">
      <label class="form-label">Psalmnummer</label>
      <input type="text" name="psalm_number" class="form-control" inputmode="numeric" value="{{ piece.psalm_number or '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">Besättning</label>
      <input type="text" name="voicing" class="form-control" value="{{ piece.voicing or '' }}" list="voicing-options">
      <datalist id="voicing-options">
        <option value="SATB"><option value="SAB"><option value="SSA"><option value="SSAA">
        <option value="TTBB"><option value="unison"><option value="solo">
      </datalist>
    </div>
    <div class="col-md-4">
      <label class="form-label">Ackompanjemang</label>
      <select name="accompaniment" class="form-select">
        {% set acc = piece.accompaniment or '' %}
        <option value="">(välj)</option>
        <option value="a_cappella" {% if acc == "a_cappella" %}selected{% endif %}>A cappella</option>
        <option value="piano" {% if acc == "piano" %}selected{% endif %}>Piano</option>
        <option value="organ" {% if acc == "organ" %}selected{% endif %}>Orgel</option>
        <option value="other" {% if acc == "other" %}selected{% endif %}>Annat</option>
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Förlag</label>
      <input type="text" name="publisher" class="form-control" value="{{ piece.publisher or '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">Förlagsnummer</label>
      <input type="text" name="edition_number" class="form-control" value="{{ piece.edition_number or '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">MusicBrainz work-ID</label>
      <input type="text" name="musicbrainz_work_id" class="form-control" value="{{ piece.musicbrainz_work_id or '' }}">
    </div>
    <div class="col-12">
      <label class="form-label">Anteckningar</label>
      <textarea name="notes" class="form-control" rows="3">{{ piece.notes or '' }}</textarea>
    </div>
  </div>

  <div class="mt-4 d-flex gap-2">
    <button type="submit" class="btn btn-primary">Spara</button>
    <a href="/pieces/{{ piece.id }}" class="btn btn-link">Avbryt</a>
  </div>
</form>
{% endblock %}
